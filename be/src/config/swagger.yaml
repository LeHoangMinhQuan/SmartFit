      security: [{ staffAuth: [] }]
      parameters:
        - {
            name: product_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
        - {
            name: variant_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
        - { name: user_id, in: path, required: true, schema: { type: integer } }
        - {
            name: review_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
      responses:
        "204": { description: Deleted }

  # ── Try-On ───────────────────────────────────────────────────────────────────
  /tryon/session:
    post:
      tags: [TryOn]
      summary: Upload photo, create session (JWT) — rate limited 5/10min
      security: [{ userAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo, product_id, variant_id]
              properties:
                photo: { type: string, format: binary }
                product_id: { type: integer }
                variant_id: { type: integer }
      responses:
        "201":
          {
            description: Session created,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        properties:
                          {
                            data: { $ref: "#/components/schemas/TryonSession" },
                          },
                      },
                  },
              },
          }
        "429": { description: Rate limit — 5 per 10 minutes }

  /tryon/session/{session_id}:
    delete:
      tags: [TryOn]
      summary: Delete session + S3 objects (JWT)
      security: [{ userAuth: [] }]
      parameters:
        - {
            name: session_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
      responses:
        "204": { description: Deleted }

  /tryon/preview:
    post:
      tags: [TryOn]
      summary: Submit garment preview job (JWT)
      security: [{ userAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, product_id, variant_id]
              properties:
                session_id: { type: integer }
                product_id: { type: integer }
                variant_id: { type: integer }
      responses:
        "200":
          {
            description: "Job submitted — poll /tryon/preview/{session_id} for result",
          }
        "403": { description: Session not found or access denied }
        "410": { description: Session expired }

  /tryon/preview/{session_id}:
    get:
      tags: [TryOn]
      summary: Poll try-on status (JWT)
      security: [{ userAuth: [] }]
      parameters:
        - {
            name: session_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TryonSession"

  # ── Uploads ──────────────────────────────────────────────────────────────────
  /uploads/images:
    post:
      tags: [Uploads]
      summary: Single image upload → insert product_image → returns image_id (Staff)
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, product_id]
              properties:
                image: { type: string, format: binary }
                product_id: { type: integer }
                variant_id: { type: integer }
      responses:
        "201": { description: Uploaded }

  /uploads/images/bulk:
    post:
      tags: [Uploads]
      summary: Bulk image upload (max 10, 5MB each, jpeg/png/webp) — returns image_id[] (Staff)
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images, product_id]
              properties:
                images:
                  {
                    type: array,
                    items: { type: string, format: binary },
                    maxItems: 10,
                  }
                product_id: { type: integer }
                variant_id: { type: integer }
      responses:
        "201": { description: Uploaded }

  # ── Health ───────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Admin]
      summary: Health check
      responses:
        "200":
          description: OK
