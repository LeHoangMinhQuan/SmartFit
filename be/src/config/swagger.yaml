            name: order_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
      responses:
        "200": { description: OK }

  /admin/orders/{order_id}/status:
    patch:
      tags: [Admin]
      summary: Update order status (Staff) — enforces valid transitions
      security: [{ staffAuth: [] }]
      parameters:
        - {
            name: order_id,
            in: path,
            required: true,
            schema: { type: integer },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum:
                    [
                      pending_payment,
                      paid,
                      preparing,
                      shipping,
                      delivered,
                      cancelled,
                      payment_failed,
                      refund_requested,
                      refunded,
                    ]
      responses:
        "200": { description: Updated }
        "400": { description: Invalid status transition }

