name: Test OIDC Connection

on:
  workflow_dispatch: # Allows you to manually trigger this workflow from the Actions tab

permissions:
  id-token: write # Strictly required to request the OIDC token
  contents: read  # Required to checkout the code

env:
  AWS_REGION: "us-east-1" # Change to your AWS region

jobs:
  test-auth:
    name: Verify AWS Identity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Replace with your actual Account ID and Role Name
          role-to-assume: arn:aws:iam::976071095505:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Test Authentication (Get Caller Identity)
        run: |
          echo "Successfully authenticated! AWS sees this runner as:"
          aws sts get-caller-identity
